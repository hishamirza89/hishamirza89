<!DOCTYPE html>
<html>
<head>
<title>Age Calculator</title>

<style>
body{
text-align:center;
font-family:Arial;
background:#eaf2ff;
padding-top:50px;
}

h1{
color:#1e40af;
}

input{
padding:10px;
width:200px;
}

button{
padding:10px 20px;
background:#1e40af;
color:white;
border:none;
border-radius:8px;
}

#result{
font-size:25px;
margin-top:20px;
font-weight:bold;
}
</style>

</head>
<body>

<h1>Age Calculator</h1>

<input type="number" id="birthyear" placeholder="Enter Birth Year">

<br><br>

<button onclick="calculateAge()">Calculate Age</button>

<p id="result"></p>

<script>

function calculateAge(){

let year = document.getElementById("birthyear").value;

let age = 2026 - year;

document.getElementById("result").innerHTML =
"🎂 Your Age is: " + age + " years";

}

</script>

</body>
</html>
