<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
</head>

<style>

body{
text-align:center;
font-family:Arial;
background:#eaf2ff;
padding-top:50px;
}

h1{
color:#1e40af;
}

input{
width:250px;
padding:10px;
margin:10px;
font-size:18px;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
background:#1e40af;
color:white;
border:none;
border-radius:8px;
}

#result{
font-size:25px;
font-weight:bold;
color:#1e40af;
}

</style>

<body>

<h1>Simple Calculator</h1>

<input type="number" id="num1" placeholder="First Number">

<br><br>

<input type="number" id="num2" placeholder="Second Number">

<br><br>

<button onclick="add()">Add</button>

<button onclick="subtract()">Subtract</button>

<button onclick="multiply()">Multiply</button>

<button onclick="divide()">Divide</button>

<p id="result"></p>

<script>

function add(){

let a = Number(document.getElementById("num1").value);

let b = Number(document.getElementById("num2").value);

let answer = a + b;

document.getElementById("result").innerHTML =
"Result: " + answer;

}
function subtract(){

let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);

document.getElementById("result").innerHTML =
"Result: " + (a - b);

}

function multiply(){

let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);

document.getElementById("result").innerHTML =
"Result: " + (a * b);

}

function divide(){

let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);

document.getElementById("result").innerHTML =
"Result: " + (a / b);

}

</script>

</body>
</html>
