<!DOCTYPE html>
<html>
<head>
<title>Number Guessing Game</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#eaf2ff;
padding-top:50px;
}

h1{
color:#1e40af;
}

input{
padding:10px;
width:200px;
}

button{
padding:10px 20px;
background:#1e40af;
color:white;
border:none;
border-radius:8px;
}

#result{
font-size:25px;
font-weight:bold;
margin-top:20px;
}

</style>

</head>
<body>

<h1>🎮 Number Guessing Game</h1>

<p>Guess a number between 1 and 10</p>

<input type="number" id="guess">

<br><br>

<button onclick="checkGuess()">Check</button>

<p id="result"></p>

<script>

let secretNumber = Math.floor(Math.random() * 10) + 1;

function checkGuess(){

let guess =
Number(document.getElementById("guess").value);

if(guess === secretNumber){

document.getElementById("result").innerHTML =
"🎉 Correct!";

}else{

document.getElementById("result").innerHTML =
"❌ Try Again!";

}

}

</script>

</body>
</html>
