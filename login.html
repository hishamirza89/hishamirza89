<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding-top:100px;
}

.login-box{
background:white;
width:300px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#1f3fbf;
color:white;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<br>

<button onclick="login()">Login</button>

<p id="result"></p>

</div>

<script>

function login(){

let user =
document.getElementById("username").value;

let pass =
document.getElementById("password").value;

if(user=="admin" && pass=="1234"){

document.getElementById("result").innerHTML =
"✅ Login Successful";

}
else{

document.getElementById("result").innerHTML =
"❌ Wrong Username or Password";

}

}

</script>

</body>
</html>
